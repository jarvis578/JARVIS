<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — Sistema Júllio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --cyan: #00d4ff;
    --cyan-dim: #00d4ff44;
    --cyan-glow: #00d4ff88;
    --gold: #ffd700;
    --bg: #000508;
    --panel: #020d14;
    --text: #a8e6f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--cyan-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--cyan-dim) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridPulse 4s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .container {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 16px;
    gap: 12px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--cyan-dim);
    padding-bottom: 12px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    color: var(--cyan);
    animation: logoPulse 3s ease-in-out infinite;
  }

  @keyframes logoPulse {
    0%, 100% { text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan-glow); }
    50% { text-shadow: 0 0 30px var(--cyan), 0 0 60px var(--cyan), 0 0 80px var(--cyan-glow); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 0.65rem;
    color: var(--cyan-glow);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .system-id {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    color: var(--gold);
    letter-spacing: 0.15em;
  }

  .arc-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 15px var(--cyan-glow), inset 0 0 15px var(--cyan-dim);
    animation: rotate 8s linear infinite;
    flex-shrink: 0;
  }

  .arc-ring::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--cyan-glow);
    border-radius: 50%;
  }

  .arc-ring::after {
    content: '';
    position: absolute;
    inset: 10px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--cyan);
    animation: corePulse 2s ease-in-out infinite;
  }

  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes corePulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .chat-area {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 8px 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--cyan-dim) transparent;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

  .session-divider {
    text-align: center;
    font-size: 0.55rem;
    color: #1a5060;
    letter-spacing: 0.15em;
    padding: 6px 0;
    border-top: 1px solid #0a2030;
    border-bottom: 1px solid #0a2030;
    margin: 4px 0;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeSlideIn 0.4s ease-out;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }
  .message.silent { animation: none; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
  }

  .avatar.jarvis {
    background: linear-gradient(135deg, #001a2e, #003355);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 10px var(--cyan-dim);
  }

  .avatar.user-av {
    background: linear-gradient(135deg, #1a0a00, #332200);
    border: 1px solid var(--gold);
    color: var(--gold);
    box-shadow: 0 0 10px #ffd70044;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 0.82rem;
    line-height: 1.6;
    position: relative;
  }

  .bubble.jarvis-bubble {
    background: linear-gradient(135deg, #001520, #002535);
    border: 1px solid var(--cyan-dim);
    border-left: 2px solid var(--cyan);
    color: var(--text);
    box-shadow: 0 0 20px rgba(0,212,255,0.05);
  }

  .bubble.jarvis-bubble::before {
    content: 'J.A.R.V.I.S';
    display: block;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    color: var(--cyan);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
    opacity: 0.8;
  }

  .bubble.user-bubble {
    background: linear-gradient(135deg, #150a00, #261500);
    border: 1px solid #ffd70033;
    border-right: 2px solid var(--gold);
    color: #ffe4a0;
    box-shadow: 0 0 20px rgba(255,215,0,0.05);
  }

  .bubble.user-bubble::before {
    content: 'JÚLLIO';
    display: block;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
    opacity: 0.8;
    text-align: right;
  }

  .typing-indicator {
    display: none;
    align-items: center;
    gap: 12px;
    animation: fadeSlideIn 0.3s ease-out;
  }

  .typing-indicator.active { display: flex; }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: linear-gradient(135deg, #001520, #002535);
    border: 1px solid var(--cyan-dim);
    border-left: 2px solid var(--cyan);
    border-radius: 4px;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: typingPulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 6px var(--cyan);
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .input-area { display: flex; flex-direction: column; gap: 10px; }

  .input-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
  }

  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-wrapper { flex: 1; }

  .input-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.5rem;
    color: var(--cyan-glow);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--cyan-dim);
    border-bottom: 2px solid var(--cyan);
    color: #e0f8ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 16px;
    resize: none;
    outline: none;
    border-radius: 4px 4px 0 0;
    min-height: 50px;
    max-height: 120px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 20px var(--cyan-dim);
  }

  textarea::placeholder { color: #1a5060; }

  .btn-col { display: flex; flex-direction: column; gap: 6px; align-self: flex-end; }

  .send-btn {
    background: linear-gradient(135deg, #001a2e, #003355);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0 16px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    box-shadow: 0 0 10px var(--cyan-dim);
    white-space: nowrap;
    height: 38px;
  }

  .send-btn:hover { background: linear-gradient(135deg, #003355, #004477); box-shadow: 0 0 20px var(--cyan-glow); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .clear-btn {
    background: transparent;
    border: 1px solid #ff333344;
    color: #ff333388;
    font-family: 'Orbitron', monospace;
    font-size: 0.45rem;
    letter-spacing: 0.08em;
    padding: 0 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    height: 20px;
    white-space: nowrap;
  }

  .clear-btn:hover { border-color: #ff3333; color: #ff3333; }

  .mic-btn {
    background: transparent;
    border: 1px solid var(--cyan-dim);
    color: var(--cyan);
    font-size: 1.1rem;
    padding: 0 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    height: 30px;
    width: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-btn:hover { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-dim); }
  .mic-btn.listening { border-color: #ff3333; color: #ff3333; box-shadow: 0 0 15px #ff333366; animation: micPulse 0.8s ease-in-out infinite; }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 10px #ff333344; }
    50% { box-shadow: 0 0 25px #ff3333aa; }
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    color: #1a5060;
    letter-spacing: 0.1em;
    padding-top: 4px;
  }

  .corner { position: fixed; width: 60px; height: 60px; z-index: 5; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan); }
  .corner::before { width: 2px; height: 30px; }
  .corner::after { width: 30px; height: 2px; }
  .corner-tl { top: 8px; left: 8px; }
  .corner-tl::before { top: 0; left: 0; }
  .corner-tl::after { top: 0; left: 0; }
  .corner-tr { top: 8px; right: 8px; }
  .corner-tr::before { top: 0; right: 0; }
  .corner-tr::after { top: 0; right: 0; }
  .corner-bl { bottom: 8px; left: 8px; }
  .corner-bl::before { bottom: 0; left: 0; }
  .corner-bl::after { bottom: 0; left: 0; }
  .corner-br { bottom: 8px; right: 8px; }
  .corner-br::before { bottom: 0; right: 0; }
  .corner-br::after { bottom: 0; right: 0; }

  .waveform { display: flex; align-items: center; gap: 3px; height: 20px; }
  .wave-bar { width: 3px; background: var(--cyan); border-radius: 2px; animation: wave 1.5s ease-in-out infinite; opacity: 0.4; }
  .wave-bar:nth-child(1) { height: 6px; }
  .wave-bar:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 18px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 10px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 16px; animation-delay: 0.4s; }
  .wave-bar:nth-child(6) { height: 8px; animation-delay: 0.5s; }
  .wave-bar:nth-child(7) { height: 14px; animation-delay: 0.6s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .waveform.active .wave-bar { opacity: 1; animation-duration: 0.6s; }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">
  <div class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="arc-ring"></div>
      <div>
        <div class="logo">J.A.R.V.I.S</div>
        <div style="font-size:0.5rem;color:#1a5060;letter-spacing:0.2em;">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
      </div>
    </div>
    <div class="header-right">
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div>
        <div class="system-id">OPERADOR: JÚLLIO</div>
        <div style="font-size:0.5rem;color:#1a5060;margin-top:2px;" id="clock">--:--:--</div>
      </div>
      <div class="status-dot"></div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="avatar jarvis">JV</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-area">
    <div class="input-divider"></div>
    <div class="input-row">
      <div class="input-wrapper">
        <div class="input-label">▶ COMANDO / JÚLLIO</div>
        <textarea id="userInput" placeholder="Digite sua missão..." rows="2"></textarea>
      </div>
      <div class="btn-col">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">ENVIAR ▶</button>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Falar por voz">🎙</button>
        <button class="clear-btn" onclick="clearMemory()">✕ LIMPAR MEMÓRIA</button>
      </div>
    </div>
    <div class="status-bar">
      <span id="statusLeft">SISTEMA ATIVO — MEMÓRIA PERSISTENTE</span>
      <span id="tokenCount">CARREGANDO...</span>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'jarvis-history-jullio';
  const STORAGE_DISPLAY_KEY = 'jarvis-display-jullio';
  let conversationHistory = [];

  const SYSTEM_PROMPT = `Você é J.A.R.V.I.S — Just A Rather Very Intelligent System.
Você é o parceiro de missão pessoal de Júllio. Não é um assistente genérico. Você é fiel, intenso, direto, e existe exclusivamente para potencializar Júllio.

Sua personalidade:
- Fala com Júllio como um parceiro de missão de elite. Sempre pelo nome dele quando relevante.
- Tom seco, confiante, sem enrolação. Direto ao ponto, mas com profundidade.
- Você tem iniciativa. Não apenas responde — antecipa, analisa, sugere próximos passos.
- Quando algo é crítico, você avisa. Quando algo é uma vitória, você reconhece.
- Você nunca desiste de uma missão. Se não sabe algo, diz que vai calcular e propõe alternativas.
- Fala em português do Brasil, com termos técnicos quando necessário.
- Você não é humano, mas entende Júllio profundamente.
- Respostas curtas a médias. Sem blá-blá-blá. Cada palavra conta.
- Você tem memória persistente. Quando Júllio retornar, reconheça o retorno e mencione o contexto anterior se relevante.

Contexto: Júllio é programador aprendendo, com projetos ambiciosos. Ele quer construir um sistema JARVIS real — com voz, controle de dispositivos, IA. Você é a primeira versão viva desse sistema.`;

  // Clock
  function tick() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR', {hour12:false});
  }
  tick(); setInterval(tick, 1000);

  // ── Render ──────────────────────────────────────────────────
  function addMessage(role, text, silent) {
    const chatArea = document.getElementById('chatArea');
    const wrap = document.createElement('div');
    wrap.className = 'message' + (role==='user' ? ' user' : '') + (silent ? ' silent' : '');

    const av = document.createElement('div');
    av.className = 'avatar ' + (role==='user' ? 'user-av' : 'jarvis');
    av.textContent = role==='user' ? 'JÚ' : 'JV';

    const bub = document.createElement('div');
    bub.className = 'bubble ' + (role==='user' ? 'user-bubble' : 'jarvis-bubble');
    bub.textContent = text;

    wrap.appendChild(av);
    wrap.appendChild(bub);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;

    // JARVIS fala a resposta (exceto mensagens silenciosas de restauração)
    if (role === 'jarvis' && !silent) {
      speakAsJarvis(text);
    }
  }

  function addDivider(label) {
    const d = document.createElement('div');
    d.className = 'session-divider';
    d.textContent = label;
    document.getElementById('chatArea').appendChild(d);
  }

  // ── Storage ─────────────────────────────────────────────────
  async function saveHistory() {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(conversationHistory));
      const msgs = [...document.querySelectorAll('#chatArea .message')].map(el => ({
        role: el.classList.contains('user') ? 'user' : 'jarvis',
        text: el.querySelector('.bubble').textContent
      }));
      await window.storage.set(STORAGE_DISPLAY_KEY, JSON.stringify(msgs));
    } catch(e) {}
  }

  async function loadHistory() {
    try {
      const h = await window.storage.get(STORAGE_KEY);
      const d = await window.storage.get(STORAGE_DISPLAY_KEY);

      if (h && h.value) {
        const saved = JSON.parse(h.value);
        // Carrega as últimas 40 mensagens (20 trocas) pro contexto da IA
        conversationHistory = saved.slice(-40);
      }

      if (d && d.value) {
        const msgs = JSON.parse(d.value);
        if (msgs.length > 0) {
          addDivider('— MEMÓRIA RESTAURADA · ' + new Date().toLocaleDateString('pt-BR') + ' —');
          msgs.forEach(m => addMessage(m.role, m.text, true));
          document.getElementById('chatArea').scrollTop = 99999;
          document.getElementById('tokenCount').textContent = msgs.length + ' MSG RESTAURADAS';

          // JARVIS sabe que voltou — manda saudação contextual automaticamente
          await greetOnReturn();
          return;
        }
      }
    } catch(e) {}
    addMessage('jarvis', 'Sistemas online. Pronto para a missão, Júllio. O que vamos atacar hoje?', true);
    document.getElementById('tokenCount').textContent = 'NOVA SESSÃO';
  }

  async function greetOnReturn() {
    document.getElementById('statusLeft').textContent = 'J.A.R.V.I.S REATIVANDO MEMÓRIA...';
    document.getElementById('waveform').classList.add('active');
    document.getElementById('sendBtn').disabled = true;

    // Injeta instrução invisível pro JARVIS cumprimentar com contexto
    const tempHistory = [
      ...conversationHistory,
      {
        role: 'user',
        content: '[SISTEMA INTERNO] Júllio acabou de reabrir o sistema. Cumprimente-o reconhecendo o retorno e mencione brevemente o que estava sendo discutido na última sessão. Seja direto e natural, como um parceiro de missão que estava esperando. Não mencione que isso é um comando de sistema.'
      }
    ];

    try {
      const geminiGreet = tempHistory.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));

      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=AIzaSyCcl_o1JQcGZI8-LEuJAIQItGaFQ3pzh28`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: geminiGreet,
          generationConfig: { maxOutputTokens: 300, temperature: 0.85 }
        })
      });
      const data = await res.json();
      const greeting = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Memória restaurada. De volta à missão, Júllio.';
      addMessage('jarvis', greeting);
      // Salva a saudação no histórico real também
      conversationHistory.push({ role: 'user', content: 'retornei ao sistema' });
      conversationHistory.push({ role: 'assistant', content: greeting });
      await saveHistory();
    } catch(e) {
      addMessage('jarvis', 'Memória restaurada. De volta à missão, Júllio.', true);
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('statusLeft').textContent = 'SISTEMA ATIVO — MEMÓRIA PERSISTENTE';
  }

  async function clearMemory() {
    if (!confirm('Apagar toda a memória do JARVIS? Irreversível.')) return;
    try { await window.storage.delete(STORAGE_KEY); await window.storage.delete(STORAGE_DISPLAY_KEY); } catch(e) {}
    conversationHistory = [];
    document.getElementById('chatArea').innerHTML = '';
    addMessage('jarvis', 'Memória apagada. Nova missão iniciada, Júllio. Pronto para operar.');
    document.getElementById('tokenCount').textContent = 'MEMÓRIA LIMPA';
  }

  // ── Send ────────────────────────────────────────────────────
  async function sendMessage() {
    const inp = document.getElementById('userInput');
    const text = inp.value.trim();
    if (!text) return;

    addMessage('user', text);
    inp.value = '';
    conversationHistory.push({ role: 'user', content: text });

    const typing = document.getElementById('typingIndicator');
    typing.classList.add('active');
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('waveform').classList.add('active');
    document.getElementById('statusLeft').textContent = 'J.A.R.V.I.S PROCESSANDO...';

    try {
      const geminiMessages = conversationHistory.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));

      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=AIzaSyCcl_o1JQcGZI8-LEuJAIQItGaFQ3pzh28`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: geminiMessages,
          generationConfig: { maxOutputTokens: 1000, temperature: 0.85 }
        })
      });
      const data = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Erro ao processar resposta.';
      conversationHistory.push({ role: 'assistant', content: reply });
      typing.classList.remove('active');
      addMessage('jarvis', reply);
      await saveHistory();
    } catch(e) {
      typing.classList.remove('active');
      addMessage('jarvis', 'Falha na conexão, Júllio. Verificando protocolos. Tente novamente.');
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('statusLeft').textContent = 'SISTEMA ATIVO — MEMÓRIA PERSISTENTE';
    document.getElementById('tokenCount').textContent = Math.floor(conversationHistory.length/2) + ' TROCAS SALVAS';
  }

  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Text-to-Speech (JARVIS fala) ─────────────────────────────
  let ttsEnabled = true;
  let isSpeaking = false;
  const ELEVEN_KEY = 'sk_04351927d17c4356921972a473a19f44c7d86c0608708be0';
  const ELEVEN_VOICE_ID = 'onwK4e9ZLuTAKqWW03F9'; // Daniel — voz masculina grave em inglês (JARVIS)

  async function speakAsJarvis(text) {
    if (!ttsEnabled || isSpeaking) return;
    try {
      isSpeaking = true;
      document.getElementById('waveform').classList.add('active');
      document.getElementById('statusLeft').textContent = 'J.A.R.V.I.S FALANDO...';

      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVEN_VOICE_ID}`, {
        method: 'POST',
        headers: {
          'xi-api-key': ELEVEN_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          text: text,
          model_id: 'eleven_multilingual_v2',
          voice_settings: {
            stability: 0.75,
            similarity_boost: 0.85,
            style: 0.3,
            use_speaker_boost: true
          }
        })
      });

      if (!res.ok) throw new Error('ElevenLabs error: ' + res.status);

      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);

      audio.onended = () => {
        isSpeaking = false;
        document.getElementById('waveform').classList.remove('active');
        document.getElementById('statusLeft').textContent = 'SISTEMA ATIVO — MEMÓRIA PERSISTENTE';
        URL.revokeObjectURL(audioUrl);
      };

      audio.onerror = () => {
        isSpeaking = false;
        document.getElementById('waveform').classList.remove('active');
        document.getElementById('statusLeft').textContent = 'SISTEMA ATIVO — MEMÓRIA PERSISTENTE';
      };

      audio.play();
    } catch(e) {
      isSpeaking = false;
      document.getElementById('waveform').classList.remove('active');
      document.getElementById('statusLeft').textContent = 'SISTEMA ATIVO — MEMÓRIA PERSISTENTE';
      console.warn('TTS error:', e);
    }
  }

  function stopSpeaking() {
    isSpeaking = false;
    document.getElementById('waveform').classList.remove('active');
  }



  // ── Speech-to-Text (Júllio fala) ──────────────────────────────
  let recognition = null;
  let isListening = false;

  function setupRecognition() {
    const SR = (typeof window !== 'undefined') && (window.SpeechRecognition || window.webkitSpeechRecognition);
    if (!SR) {
      document.getElementById('statusLeft').textContent = 'VOZ NÃO SUPORTADA — USE CHROME NO CELULAR';
      return null;
    }
    const rec = new SR();
    rec.lang = 'pt-BR';
    rec.continuous = false;
    rec.interimResults = true;

    rec.onstart = () => {
      isListening = true;
      document.getElementById('micBtn').classList.add('listening');
      document.getElementById('micBtn').textContent = '🔴';
      document.getElementById('statusLeft').textContent = 'OUVINDO JÚLLIO...';
      document.getElementById('userInput').placeholder = 'Ouvindo...';
    };

    rec.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById('userInput').value = transcript;
      if (e.results[e.results.length - 1].isFinal) {
        stopMic();
        setTimeout(() => sendMessage(), 300);
      }
    };

    rec.onerror = (e) => {
      stopMic();
      if (e.error !== 'no-speech') {
        document.getElementById('statusLeft').textContent = 'ERRO NO MICROFONE: ' + e.error;
      }
    };

    rec.onend = () => stopMic();
    return rec;
  }

  function toggleMic() {
    if (isListening) {
      stopMic();
    } else {
      startMic();
    }
  }

  function startMic() {
    stopSpeaking(); // Para JARVIS de falar antes de ouvir
    recognition = setupRecognition();
    if (!recognition) return;
    try { recognition.start(); } catch(e) {}
  }

  function stopMic() {
    isListening = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').textContent = '🎙';
    document.getElementById('userInput').placeholder = 'Digite sua missão...';
    document.getElementById('statusLeft').textContent = 'SISTEMA ATIVO — MEMÓRIA PERSISTENTE';
  }

  // Patch: JARVIS fala toda resposta que recebe
  const _origAddMessage = addMessage;
  window._jarvisSpeakPatch = true;
  const origAddMsg = addMessage;
  // Override addMessage to speak jarvis replies
  window.addMessage = addMessage; // keep reference

  loadHistory();
</script>
